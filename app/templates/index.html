{% extends "base.html" %}
{% block title %}Dapoerasatoe — Kasir Bazaar{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex flex-col items-center justify-center text-center py-12">
  <div class="mb-8">
    <div class="text-7xl mb-4">🍽️</div>
    <h2 class="text-4xl font-bold text-brand-800 mb-2">Dapoerasatoe</h2>
    <p class="text-brand-600 text-lg">Sistem Kasir Bazaar</p>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 w-full max-w-lg">
    <!-- Kasir Mode -->
    <a href="/kasir"
       class="group bg-white border-2 border-brand-300 rounded-2xl p-8 hover:border-brand-500 hover:shadow-xl transition-all duration-200 flex flex-col items-center gap-4">
      <div class="text-5xl group-hover:scale-110 transition-transform duration-200">🧾</div>
      <div>
        <h3 class="text-xl font-bold text-brand-800">Mode Kasir</h3>
        <p class="text-gray-500 text-sm mt-1">Buka POS & buat struk</p>
      </div>
      <span class="mt-auto px-6 py-2 bg-brand-600 text-white rounded-full text-sm font-semibold group-hover:bg-brand-700 transition">
        Mulai Kasir →
      </span>
    </a>

    <!-- Admin Mode -->
    <a href="/admin/events"
       class="group bg-white border-2 border-gray-200 rounded-2xl p-8 hover:border-gray-400 hover:shadow-xl transition-all duration-200 flex flex-col items-center gap-4">
      <div class="text-5xl group-hover:scale-110 transition-transform duration-200">⚙️</div>
      <div>
        <h3 class="text-xl font-bold text-gray-700">Mode Admin</h3>
        <p class="text-gray-500 text-sm mt-1">Kelola event, menu & rekap</p>
      </div>
      <span class="mt-auto px-6 py-2 bg-gray-600 text-white rounded-full text-sm font-semibold group-hover:bg-gray-700 transition">
        Masuk Admin →
      </span>
    </a>
  </div>
</div>
{% endblock %}
